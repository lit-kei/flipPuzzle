<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Input UI</title>
<style>
body {
    font-family: sans-serif;
    background: #f4f4f4;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
}

h1 {
    margin-bottom: 10px;
}

#board {
    display: grid;
    grid-template-columns: repeat(5, 70px);
    gap: 6px;
    background: #222;
    padding: 6px;
    border-radius: 12px;
}

.cell {
    width: 70px;
    height: 70px;
    border: none;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
}

.cell:hover {
    transform: scale(0.95);
}

.controls {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

button.control {
    padding: 10px 20px;
    border: 1px black solid;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}


#solution {
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.solution-board {
    display: grid;
    grid-template-columns: repeat(5, 50px);
    gap: 4px;
    background: #222;
    padding: 4px;
    border-radius: 8px;
    width: fit-content;
}

.solution-cell {
    width: 50px;
    height: 50px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
}
.solution-cell.back {
    position: relative;
    overflow: hidden;
}

.solution-cell.back::after {
    content: "";
    position: absolute;
    inset: 0;

    /* 斜線 */
    background:
        repeating-linear-gradient(
            45deg,
            rgba(0,0,0,0.35) 0px,
            rgba(0,0,0,0.35) 4px,
            transparent 4px,
            transparent 10px
        );

    pointer-events: none;
}
#modalOverlay {
    display: none; /* 最初は非表示 */
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);

    justify-content: center;
    align-items: center;
}

/* モーダル本体 */
#importMenu {
    background: white;
    padding: 20px;
    border-radius: 10px;
    min-width: 300px;
    text-align: center;
}

select {
    width: 100%;
    margin: 10px 0;
    padding: 5px;
}


.color0 { background: white; }
.color1 { background: #ff9090; }
.color2 { background: #90b8ff; }
.color3 { background: #90ff90; }
.color4 { background: #ffe680; }
</style>
</head>
<body>

<h1>パズル盤面入力</h1>
<p>クリックでブロックIDを切り替えます（0 → 1 → 2 → 3 → 4）</p>

<div id="board"></div>

<div class="controls">
    <button class="control" onclick="clearBoard()">Clear</button>
    <button class="control" onclick="solve()">Solve</button>
	 <button class="control" id="importBtn">Import</button>

</div>

<div id="solution"></div>


<!-- モーダル -->
<div id="modalOverlay">
    <div id="importMenu">
        <h3>データを選択</h3>
        <select id="saveSelect"></select>
        <button id="closeBtn" class="control">Close</button>
        <button id="loadBtn" class="control">Load</button>
    </div>
</div>
	
<script src="main.js">
</script>

</body>
</html>
